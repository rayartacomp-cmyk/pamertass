<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil Saya - PAMERTASS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .profile-header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
        }
        .profile-avatar {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 40px;
        }
        .info-item {
            padding: 15px;
            border-bottom: 1px solid #eee;
        }
        .info-label {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .info-value {
            font-size: 16px;
            font-weight: 500;
            color: #333;
        }
        .btn-back {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            width: 100%;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="profile-header">
            <div class="profile-avatar">
                <i class="fas fa-user"></i>
            </div>
            <h3 id="fullName">Loading...</h3>
            <p class="text-muted" id="username">@loading</p>
        </div>

        <div class="card">
            <div class="card-body">
                <h5 class="card-title mb-3">Informasi Pribadi</h5>
                
                <div class="info-item">
                    <div class="info-label">Nama Lengkap</div>
                    <div class="info-value" id="displayFullName">-</div>
                </div>
                
                <div class="info-item">
                    <div class="info-label">Username</div>
                    <div class="info-value" id="displayUsername">-</div>
                </div>
                
                <div class="info-item">
                    <div class="info-label">Email</div>
                    <div class="info-value" id="email">-</div>
                </div>
                
                <div class="info-item">
                    <div class="info-label">No. Telepon</div>
                    <div class="info-value" id="phone">-</div>
                </div>
                
                <div class="info-item">
                    <div class="info-label">Role</div>
                    <div class="info-value" id="role">-</div>
                </div>
                
                <div class="info-item">
                    <div class="info-label">Bergabung Sejak</div>
                    <div class="info-value" id="joinDate">-</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-body">
                <h5 class="card-title mb-3">Pengaturan Akun</h5>
                <a href="change-password.html" class="btn btn-warning w-100 mb-2">Ganti Password</a>
                <a href="dashboard.html" class="btn-back">Kembali ke Dashboard</a>
            </div>
        </div>
    </div>

    <script src="https://kit.fontawesome.com/your-kit-code.js" crossorigin="anonymous"></script>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        
        if (!token) {
            window.location.href = '/login.html';
        }

        // Tampilkan data user
        document.getElementById('fullName').textContent = user.full_name || 'Anggota PMR';
        document.getElementById('username').textContent = '@' + (user.username || 'username');
        document.getElementById('displayFullName').textContent = user.full_name || '-';
        document.getElementById('displayUsername').textContent = user.username || '-';
        document.getElementById('email').textContent = user.email || '-';
        document.getElementById('phone').textContent = user.phone || '-';
        document.getElementById('role').textContent = user.role || 'member';
        document.getElementById('joinDate').textContent = user.created_at ? new Date(user.created_at).toLocaleDateString('id-ID') : '-';

        async function loadMemberDetails() {
            try {
                const response = await fetch(`/.netlify/functions/members/${user.id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                if (response.ok) {
                    const memberData = await response.json();
                    // Tampilkan data tambahan member jika ada
                }
            } catch (error) {
                console.error('Error loading member details:', error);
            }
        }

        loadMemberDetails();
    </script>
</body>
</html>
