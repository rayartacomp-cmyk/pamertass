<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ganti Password - PAMERTASS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            max-width: 400px;
            width: 100%;
        }
        .form-control {
            height: 50px;
            border-radius: 10px;
            border: 2px solid #eee;
            margin-bottom: 15px;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: none;
        }
        .btn-change {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            height: 50px;
            border: none;
            border-radius: 10px;
            width: 100%;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
        }
        .btn-back {
            background: #6c757d;
            color: white;
            height: 50px;
            border: none;
            border-radius: 10px;
            width: 100%;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
            text-align: center;
            line-height: 50px;
            margin-top: 10px;
        }
        .alert {
            border-radius: 10px;
            display: none;
        }
    </style>
</head>
<body>
    <div class="card p-4">
        <h3 class="text-center mb-4">Ganti Password</h3>
        
        <div class="alert alert-success" id="successAlert" role="alert">
            Password berhasil diubah!
        </div>
        
        <div class="alert alert-danger" id="errorAlert" role="alert"></div>
        
        <form id="changePasswordForm">
            <div class="mb-3">
                <label>Password Lama</label>
                <input type="password" class="form-control" id="oldPassword" required>
            </div>
            
            <div class="mb-3">
                <label>Password Baru</label>
                <input type="password" class="form-control" id="newPassword" required minlength="6">
                <small class="text-muted">Minimal 6 karakter</small>
            </div>
            
            <div class="mb-3">
                <label>Konfirmasi Password Baru</label>
                <input type="password" class="form-control" id="confirmPassword" required>
            </div>
            
            <button type="submit" class="btn-change">Ubah Password</button>
            <a href="profile.html" class="btn-back">Kembali ke Profil</a>
        </form>
    </div>

    <script>
        const token = localStorage.getItem('token');
        
        if (!token) {
            window.location.href = '/login.html';
        }

        document.getElementById('changePasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const oldPassword = document.getElementById('oldPassword').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            
            // Reset alerts
            document.getElementById('successAlert').style.display = 'none';
            document.getElementById('errorAlert').style.display = 'none';
            
            // Validasi
            if (newPassword !== confirmPassword) {
                document.getElementById('errorAlert').textContent = 'Password baru tidak cocok!';
                document.getElementById('errorAlert').style.display = 'block';
                return;
            }
            
            if (newPassword.length < 6) {
                document.getElementById('errorAlert').textContent = 'Password minimal 6 karakter!';
                document.getElementById('errorAlert').style.display = 'block';
                return;
            }
            
            try {
                const response = await fetch('/.netlify/functions/auth/change-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ oldPassword, newPassword })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    document.getElementById('errorAlert').textContent = data.error || 'Gagal mengubah password';
                    document.getElementById('errorAlert').style.display = 'block';
                    return;
                }
                
                // Success
                document.getElementById('successAlert').style.display = 'block';
                document.getElementById('changePasswordForm').reset();
                
                // Redirect ke profile setelah 2 detik
                setTimeout(() => {
                    window.location.href = 'profile.html';
                }, 2000);
                
            } catch (error) {
                document.getElementById('errorAlert').textContent = 'Network error. Please try again.';
                document.getElementById('errorAlert').style.display = 'block';
            }
        });
    </script>
</body>
</html>
