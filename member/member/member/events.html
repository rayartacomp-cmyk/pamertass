<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event - PAMERTASS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .event-card {
            background: white;
            border-radius: 15px;
            padding: 0;
            margin-bottom: 20px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        .event-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
        }
        .event-body {
            padding: 20px;
        }
        .event-date {
            font-size: 14px;
            margin-bottom: 10px;
        }
        .event-title {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .event-location {
            color: #666;
            font-size: 14px;
            margin-bottom: 15px;
        }
        .event-description {
            color: #333;
            margin-bottom: 20px;
        }
        .event-status {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }
        .status-upcoming {
            background: #28a745;
            color: white;
        }
        .status-ongoing {
            background: #ffc107;
            color: #333;
        }
        .status-ended {
            background: #6c757d;
            color: white;
        }
        .btn-back {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            width: 100%;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card p-4">
            <h3 class="text-center mb-4">Event PMR</h3>
            
            <!-- Filter -->
            <div class="row mb-4">
                <div class="col-12">
                    <select class="form-control" id="statusFilter">
                        <option value="upcoming">Event Mendatang</option>
                        <option value="all">Semua Event</option>
                        <option value="ended">Event Selesai</option>
                    </select>
                </div>
            </div>
            
            <!-- Daftar Event -->
            <div id="eventList">
                <p class="text-muted text-center">Memuat event...</p>
            </div>
        </div>
        
        <a href="dashboard.html" class="btn-back">Kembali ke Dashboard</a>
    </div>
    
    <script src="https://kit.fontawesome.com/your-kit-code.js" crossorigin="anonymous"></script>
    <script>
        const token = localStorage.getItem('token');
        
        if (!token) {
            window.location.href = '/login.html';
        }
        
        async function loadEvents() {
            const status = document.getElementById('statusFilter').value;
            
            try {
                let url = '/.netlify/functions/events';
                if (status !== 'all') {
                    url += `?status=${status}`;
                }
                
                const response = await fetch(url, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                const events = await response.json();
                displayEvents(events);
                
            } catch (error) {
                console.error('Error loading events:', error);
                document.getElementById('eventList').innerHTML = 
                    '<p class="text-danger text-center">Gagal memuat event</p>';
            }
        }
        
        function displayEvents(events) {
            const container = document.getElementById('eventList');
            
            if (events.length === 0) {
                container.innerHTML = '<p class="text-muted text-center">Tidak ada event</p>';
                return;
            }
            
            const now = new Date();
            
            let html = '';
            events.forEach(e => {
                const startDate = new Date(e.start_date);
                const endDate = new Date(e.end_date);
                
                // Tentukan status realtime
                let status = e.status;
                let statusClass = 'status-' + status;
                
                if (now >= startDate && now <= endDate) {
                    status = 'ongoing';
                    statusClass = 'status-ongoing';
                } else if (now > endDate) {
                    status = 'ended';
                    statusClass = 'status-ended';
                }
                
                html += `
                    <div class="event-card">
                        <div class="event-header">
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="event-status ${statusClass}">${status.toUpperCase()}</span>
                                <small>${startDate.toLocaleDateString('id-ID')}</small>
                            </div>
                            <h4 class="event-title mt-2">${e.title}</h4>
                            <div class="event-location text-white-50">
                                <i class="fas fa-map-marker-alt me-1"></i>${e.location || 'TBD'}
                            </div>
                        </div>
                        <div class="event-body">
                            <p class="event-description">${e.description || 'Tidak ada deskripsi'}</p>
                            <div class="row text-center">
                                <div class="col-6">
                                    <small>Mulai</small>
                                    <p class="fw-bold">${startDate.toLocaleString('id-ID')}</p>
                                </div>
                                <div class="col-6">
                                    <small>Selesai</small>
                                    <p class="fw-bold">${endDate.toLocaleString('id-ID')}</p>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            container.innerHTML = html;
        }
        
        // Event listener
        document.getElementById('statusFilter').addEventListener('change', loadEvents);
        
        // Load data
        loadEvents();
    </script>
</body>
</html>
