<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jadwal Kegiatan - PAMERTASS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            margin-bottom: 20px;
        }
        .schedule-item {
            padding: 20px;
            border-left: 4px solid #667eea;
            background: #f8f9fa;
            border-radius: 10px;
            margin-bottom: 15px;
        }
        .schedule-date {
            color: #667eea;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .schedule-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .schedule-time {
            color: #666;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .schedule-location {
            color: #666;
            font-size: 14px;
        }
        .btn-back {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 10px;
            width: 100%;
            font-size: 16px;
            text-decoration: none;
            display: inline-block;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card p-4">
            <h3 class="text-center mb-4">Jadwal Kegiatan</h3>
            
            <!-- Filter -->
            <div class="row mb-4">
                <div class="col-6">
                    <select class="form-control" id="monthFilter">
                        <option value="all">Semua Bulan</option>
                        <option value="1">Januari</option>
                        <option value="2">Februari</option>
                        <option value="3">Maret</option>
                        <option value="4">April</option>
                        <option value="5">Mei</option>
                        <option value="6">Juni</option>
                        <option value="7">Juli</option>
                        <option value="8">Agustus</option>
                        <option value="9">September</option>
                        <option value="10">Oktober</option>
                        <option value="11">November</option>
                        <option value="12">Desember</option>
                    </select>
                </div>
                <div class="col-6">
                    <select class="form-control" id="typeFilter">
                        <option value="all">Semua Jenis</option>
                        <option value="latihan">Latihan</option>
                        <option value="rapat">Rapat</option>
                        <option value="kegiatan">Kegiatan</option>
                        <option value="pelatihan">Pelatihan</option>
                    </select>
                </div>
            </div>
            
            <!-- Daftar Jadwal -->
            <div id="scheduleList">
                <p class="text-muted text-center">Memuat jadwal...</p>
            </div>
        </div>
        
        <a href="dashboard.html" class="btn-back">Kembali ke Dashboard</a>
    </div>
    
    <script src="https://kit.fontawesome.com/your-kit-code.js" crossorigin="anonymous"></script>
    <script>
        const token = localStorage.getItem('token');
        
        if (!token) {
            window.location.href = '/login.html';
        }
        
        let allSchedules = [];
        
        async function loadSchedules() {
            try {
                const response = await fetch('/.netlify/functions/schedules', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                
                allSchedules = await response.json();
                filterAndDisplay();
                
            } catch (error) {
                console.error('Error loading schedules:', error);
                document.getElementById('scheduleList').innerHTML = 
                    '<p class="text-danger text-center">Gagal memuat jadwal</p>';
            }
        }
        
        function filterAndDisplay() {
            const month = document.getElementById('monthFilter').value;
            const type = document.getElementById('typeFilter').value;
            
            let filtered = allSchedules;
            
            // Filter by month
            if (month !== 'all') {
                filtered = filtered.filter(s => {
                    const sMonth = new Date(s.date).getMonth() + 1;
                    return sMonth.toString() === month;
                });
            }
            
            // Filter by type
            if (type !== 'all') {
                filtered = filtered.filter(s => s.type === type);
            }
            
            // Sort by date
            filtered.sort((a, b) => new Date(a.date) - new Date(b.date));
            
            displaySchedules(filtered);
        }
        
        function displaySchedules(schedules) {
            const container = document.getElementById('scheduleList');
            
            if (schedules.length === 0) {
                container.innerHTML = '<p class="text-muted text-center">Tidak ada jadwal</p>';
                return;
            }
            
            // Group by date
            const grouped = {};
            schedules.forEach(s => {
                const date = s.date;
                if (!grouped[date]) grouped[date] = [];
                grouped[date].push(s);
            });
            
            let html = '';
            for (const [date, items] of Object.entries(grouped)) {
                const formattedDate = new Date(date).toLocaleDateString('id-ID', {
                    weekday: 'long',
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
                
                html += `<h6 class="mt-3 mb-2">${formattedDate}</h6>`;
                
                items.forEach(s => {
                    html += `
                        <div class="schedule-item">
                            <div class="schedule-title">${s.title}</div>
                            <div class="schedule-time">
                                <i class="fas fa-clock me-1"></i>${s.start_time} - ${s.end_time}
                            </div>
                            <div class="schedule-location">
                                <i class="fas fa-map-marker-alt me-1"></i>${s.location || 'TBD'}
                            </div>
                            ${s.description ? `<p class="mt-2 mb-0">${s.description}</p>` : ''}
                        </div>
                    `;
                });
            }
            
            container.innerHTML = html;
        }
        
        // Event listeners
        document.getElementById('monthFilter').addEventListener('change', filterAndDisplay);
        document.getElementById('typeFilter').addEventListener('change', filterAndDisplay);
        
        // Load data
        loadSchedules();
    </script>
</body>
</html>
