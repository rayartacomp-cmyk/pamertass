<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stok Obat - PAMERTASS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: #f8f9fa;
            margin-left: 250px;
            padding: 30px;
        }
        .sidebar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            position: fixed;
            width: 250px;
            top: 0;
            left: 0;
            color: white;
        }
        .nav-link {
            color: rgba(255,255,255,0.8);
            padding: 15px 25px;
        }
        .nav-link:hover {
            color: white;
            background: rgba(255,255,255,0.1);
        }
        .card {
            border-radius: 15px;
            border: none;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }
        .btn-add {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header p-4 text-center">
            <i class="fas fa-heartbeat fa-3x"></i>
            <h4>PAMERTASS</h4>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link" href="dashboard.html"><i class="fas fa-home me-2"></i>Dashboard</a>
            <a class="nav-link" href="members.html"><i class="fas fa-users me-2"></i>Anggota</a>
            <a class="nav-link active" href="medicines.html"><i class="fas fa-pills me-2"></i>Stok Obat</a>
            <a class="nav-link" href="attendance.html"><i class="fas fa-qrcode me-2"></i>Absensi</a>
            <a class="nav-link" href="schedules.html"><i class="fas fa-calendar me-2"></i>Jadwal</a>
            <a class="nav-link" href="events.html"><i class="fas fa-calendar-alt me-2"></i>Event</a>
            <a class="nav-link" href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
        </nav>
    </div>

    <div class="container-fluid">
        <h2 class="mb-4">Manajemen Stok Obat</h2>
        
        <button class="btn-add mb-4" data-bs-toggle="modal" data-bs-target="#addMedicineModal">
            <i class="fas fa-plus me-2"></i>Tambah Obat
        </button>

        <div class="card">
            <div class="card-body">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Nama Obat</th>
                            <th>Kategori</th>
                            <th>Stok</th>
                            <th>Satuan</th>
                            <th>Expired</th>
                            <th>Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="medicineTable">
                        <tr><td colspan="6" class="text-center">Loading...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Modal Tambah Obat -->
    <div class="modal fade" id="addMedicineModal">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5>Tambah Obat Baru</h5>
                </div>
                <div class="modal-body">
                    <form id="addMedicineForm">
                        <div class="mb-3">
                            <label>Nama Obat</label>
                            <input type="text" class="form-control" id="name" required>
                        </div>
                        <div class="mb-3">
                            <label>Kategori</label>
                            <select class="form-control" id="category">
                                <option>Obat Bebas</option>
                                <option>Obat Bebas Terbatas</option>
                                <option>Obat Keras</option>
                                <option>Alat Kesehatan</option>
                            </select>
                        </div>
                        <div class="row">
                            <div class="col-6 mb-3">
                                <label>Jumlah Stok</label>
                                <input type="number" class="form-control" id="quantity">
                            </div>
                            <div class="col-6 mb-3">
                                <label>Satuan</label>
                                <input type="text" class="form-control" id="unit" value="tablet">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label>Tanggal Expired</label>
                            <input type="date" class="form-control" id="expiry_date">
                        </div>
                        <div class="mb-3">
                            <label>Minimal Stok</label>
                            <input type="number" class="form-control" id="min_stock" value="5">
                        </div>
                        <div class="mb-3">
                            <label>Lokasi Penyimpanan</label>
                            <input type="text" class="form-control" id="location">
                        </div>
                        <div class="mb-3">
                            <label>Keterangan</label>
                            <textarea class="form-control" id="description"></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Batal</button>
                    <button class="btn btn-primary" onclick="addMedicine()">Simpan</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        
        if (!token) window.location.href = '/login.html';
        if (user.role !== 'admin') window.location.href = '/member/dashboard.html';

        async function loadMedicines() {
            try {
                const response = await fetch('/.netlify/functions/medicines', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const medicines = await response.json();
                
                const tableBody = document.getElementById('medicineTable');
                if (medicines.length > 0) {
                    tableBody.innerHTML = medicines.map(m => `
                        <tr>
                            <td>${m.name}</td>
                            <td>${m.category || '-'}</td>
                            <td class="${m.quantity <= m.min_stock ? 'text-danger fw-bold' : ''}">${m.quantity}</td>
                            <td>${m.unit || '-'}</td>
                            <td>${m.expiry_date || '-'}</td>
                            <td>
                                <button class="btn btn-sm btn-warning" onclick="editMedicine('${m.id}')">
                                    <i class="fas fa-edit"></i>
                                </button>
                                <button class="btn btn-sm btn-danger" onclick="deleteMedicine('${m.id}')">
                                    <i class="fas fa-trash"></i>
                                </button>
                            </td>
                        </tr>
                    `).join('');
                } else {
                    tableBody.innerHTML = '<tr><td colspan="6" class="text-center">Belum ada data obat</td></tr>';
                }
            } catch (error) {
                console.error(error);
            }
        }

        async function addMedicine() {
            const medicine = {
                name: document.getElementById('name').value,
                category: document.getElementById('category').value,
                quantity: parseInt(document.getElementById('quantity').value) || 0,
                unit: document.getElementById('unit').value,
                expiry_date: document.getElementById('expiry_date').value,
                min_stock: parseInt(document.getElementById('min_stock').value) || 5,
                location: document.getElementById('location').value,
                description: document.getElementById('description').value
            };

            try {
                const response = await fetch('/.netlify/functions/medicines', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify(medicine)
                });

                if (response.ok) {
                    alert('Obat berhasil ditambahkan!');
                    location.reload();
                } else {
                    alert('Gagal menambahkan obat');
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        async function deleteMedicine(id) {
            if (!confirm('Yakin ingin menghapus?')) return;
            
            try {
                const response = await fetch(`/.netlify/functions/medicines/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    alert('Obat berhasil dihapus!');
                    loadMedicines();
                }
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        }

        loadMedicines();
    </script>
</body>
</html>
