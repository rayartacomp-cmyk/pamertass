<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - PAMERTASS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f8f9fa;
        }
        .sidebar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            position: fixed;
            width: 250px;
            color: white;
        }
        .sidebar-header {
            padding: 30px 20px;
            text-align: center;
        }
        .nav-link {
            color: rgba(255,255,255,0.8);
            padding: 15px 25px;
        }
        .nav-link:hover {
            color: white;
            background: rgba(255,255,255,0.1);
        }
        .main-content {
            margin-left: 250px;
            padding: 30px;
        }
        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="sidebar">
        <div class="sidebar-header">
            <i class="fas fa-heartbeat fa-3x"></i>
            <h4>PAMERTASS</h4>
            <p>Admin Panel</p>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link active" href="dashboard.html"><i class="fas fa-home me-2"></i>Dashboard</a>
            <a class="nav-link" href="members.html"><i class="fas fa-users me-2"></i>Anggota</a>
            <a class="nav-link" href="medicines.html"><i class="fas fa-pills me-2"></i>Stok Obat</a>
            <a class="nav-link" href="attendance.html"><i class="fas fa-qrcode me-2"></i>Absensi</a>
            <a class="nav-link" href="schedules.html"><i class="fas fa-calendar me-2"></i>Jadwal</a>
            <a class="nav-link" href="events.html"><i class="fas fa-calendar-alt me-2"></i>Event</a>
            <a class="nav-link" href="#" onclick="logout()"><i class="fas fa-sign-out-alt me-2"></i>Logout</a>
        </nav>
    </div>

    <div class="main-content">
        <h2>Dashboard Admin</h2>
        
        <div class="row mt-4">
            <div class="col-md-3">
                <div class="stat-card">
                    <h3 id="totalMembers">0</h3>
                    <p>Total Anggota</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <h3 id="totalMedicines">0</h3>
                    <p>Total Obat</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <h3 id="todayAttendance">0</h3>
                    <p>Hadir Hari Ini</p>
                </div>
            </div>
            <div class="col-md-3">
                <div class="stat-card">
                    <h3 id="upcomingEvents">0</h3>
                    <p>Event Mendatang</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        
        if (!token) window.location.href = '/login.html';
        if (user.role !== 'admin') window.location.href = '/member/dashboard.html';

        async function loadDashboard() {
            try {
                const res = await fetch('/.netlify/functions/members', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const members = await res.json();
                document.getElementById('totalMembers').textContent = members.length;
                
                const res2 = await fetch('/.netlify/functions/medicines', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });
                const medicines = await res2.json();
                document.getElementById('totalMedicines').textContent = medicines.length;
                
            } catch (error) {
                console.error(error);
            }
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = '/login.html';
        }

        loadDashboard();
    </script>
</body>
</html>
